name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597365c4c1f1c # v5.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@fe02d34f77f8bc703788d5817da081398fad5dd2 # v4.1.0

      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Validate programme data
        run: pnpm run data:validate

      - name: Lint
        run: pnpm run lint

      - name: Type-check
        run: pnpm run check

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true
